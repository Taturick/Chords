<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tatu Chords Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Roboto+Mono:wght@500;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f1f5f9; overflow-x: hidden; }
        .font-mono { font-family: 'Roboto Mono', monospace; }
        
        /* FIX PARA IOS ANTIGO (DAISYUI FALLBACK) */
        .bg-slate-900 { background-color: #0f172a !important; }
        .bg-black { background-color: #000000 !important; }
        .btn-success { background-color: #22c55e !important; color: #000 !important; }
        .btn-primary { background-color: #3b82f6 !important; color: #fff !important; }
        .btn-ghost { background: transparent !important; border: 1px solid #334155 !important; }
        .text-green-400 { color: #4ade80 !important; }
        .text-blue-400 { color: #60a5fa !important; }
        
        /* FIX PARA O GAP (Safari 12 não suporta gap em flex) */
        .flex { display: -webkit-box; display: -webkit-flex; display: flex; }
        .gap-2 > * { margin: 4px; }
        .gap-4 > * { margin: 8px; }

        /* Estilo da Cifra */
        .chord { color: #4ade80; font-weight: 700; height: 1.25rem; white-space: pre; font-size: 1.1em; }
        .lyric-line { color: #e2e8f0; font-weight: 600; line-height: 1.3; margin-bottom: 3px; }
        .note { color: #f87171; font-style: italic; border-left: 4px solid #f87171; padding-left: 10px; margin: 12px 0; background: rgba(248, 113, 113, 0.1); padding-top: 4px; padding-bottom: 4px; }
        .verse-block { margin-bottom: 1.8rem; break-inside: avoid; }

        .lyrics-container { column-gap: 2rem; column-fill: auto; height: auto; }

        /* Fullscreen */
        #show-play-screen.is-fullscreen .player-ui { display: none !important; }
        #show-play-screen.is-fullscreen #play-lyrics { padding-top: 30px; }

        /* Tabs manuais para garantir que apareçam */
        .tab { padding: 10px 20px; cursor: pointer; border-radius: 8px; font-weight: bold; flex: 1; text-align: center; }
        .tab-active { background-color: #22c55e !important; color: #000 !important; }

        /* Modal fallback para iPad */
        .modal-custom { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #0f172a; border: 1px solid #334155; padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div id="main-app" class="max-w-4xl mx-auto pb-10">
    <header class="p-6 text-center">
        <h1 class="text-3xl font-bold text-green-400">TATU CHORDS</h1>
    </header>

    <!-- Navegação -->
    <div class="px-4 mb-6">
        <div class="flex bg-slate-900 border border-slate-800 p-1 w-full rounded-xl">
            <button class="tab tab-active" id="tab-btn-musicas" onclick="setTab('musicas')">Músicas</button>
            <button class="tab" id="tab-btn-shows" onclick="setTab('shows')">Shows</button>
            <button class="tab" id="tab-btn-editor" onclick="setTab('editor')">Editor</button>
        </div>
    </div>

    <!-- ABA: MÚSICAS -->
    <section id="tab-musicas" class="tab-content px-4">
        <input type="text" id="search-input" placeholder="Buscar música ou artista..." 
               class="p-4 rounded-lg w-full bg-slate-900 border border-slate-700 mb-6 text-white" oninput="searchSongs()">
        <div id="artist-tabs" class="flex overflow-x-auto no-scrollbar mb-6 pb-2" style="-webkit-overflow-scrolling: touch;"></div>
        <div id="biblioteca-list" class="flex flex-col"></div>
    </section>

    <!-- ABA: SHOWS -->
    <section id="tab-shows" class="tab-content hidden px-4">
        <div class="flex mb-6">
            <button class="btn-primary p-3 rounded-lg flex-1" onclick="createShow()">➕ Novo Show</button>
            <button class="btn-ghost p-3 rounded-lg ml-2 text-green-400" onclick="exportarMasterApp()">GERAR APP IPAD</button>
        </div>
        <div id="shows-list" class="flex flex-col"></div>
    </section>

    <!-- ABA: EDITOR -->
    <section id="tab-editor" class="tab-content hidden px-4 pb-10">
        <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800">
            <div class="flex flex-col mb-4">
                <input id="ed-title" placeholder="Título" class="p-3 bg-black border border-slate-700 rounded mb-2">
                <input id="ed-artist" placeholder="Artista" class="p-3 bg-black border border-slate-700 rounded">
            </div>
            <div class="flex mb-4">
                <input id="ed-key" placeholder="Tom" class="p-3 bg-black border border-slate-700 rounded flex-1 mr-2 text-green-400 font-bold">
                <input id="ed-preset" placeholder="Preset POD" class="p-3 bg-black border border-slate-700 rounded flex-1 text-blue-400">
            </div>
            
            <textarea id="ed-cifra" oninput="updateEditorPreview()" placeholder="Cifra aqui..." 
                      class="w-full h-48 font-mono bg-black border border-slate-700 p-3 rounded mb-4"></textarea>

            <div class="flex justify-between items-center bg-black p-2 rounded-lg mb-4">
                <div class="flex">
                    <button class="bg-slate-800 p-2 rounded mr-1" onclick="changeEdFont(-1)">A-</button>
                    <button class="bg-slate-800 p-2 rounded" onclick="changeEdFont(1)">A+</button>
                </div>
                <div class="flex">
                    <button class="bg-slate-800 p-2 rounded mr-1" onclick="setEdCols(1)">1 Col</button>
                    <button class="bg-slate-800 p-2 rounded" onclick="setEdCols(2)">2 Col</button>
                </div>
            </div>

            <div id="editor-preview" class="bg-black border border-slate-800 rounded-xl p-4 min-h-[200px] mb-6"></div>

            <div class="flex">
                <button class="btn-success p-4 rounded-xl flex-1 font-bold" onclick="saveToLibrary()">💾 Salvar</button>
                <button class="ml-4 text-slate-400" onclick="clearEditor()">Limpar</button>
            </div>
        </div>
    </section>
</div>

<!-- PLAYER DE PERFORMANCE -->
<div id="show-play-screen" class="fixed inset-0 bg-black z-50 hidden flex flex-col">
    <div class="player-ui p-4 bg-slate-900 flex justify-between items-center border-b border-slate-800">
        <div class="flex items-center">
            <button class="text-2xl mr-4" onclick="backToMenu()">✕</button>
            <div>
                <h2 id="play-title" class="font-bold text-green-400">Música</h2>
                <p id="play-meta" class="text-xs text-slate-400"></p>
                <p id="play-preset" class="text-[10px] text-blue-400 font-bold"></p>
            </div>
        </div>
        <div class="flex items-center">
            <button class="bg-slate-800 w-10 h-10 rounded" onclick="transposeDown()">-</button>
            <div class="w-8 text-center font-bold text-green-400" id="transpose-val">0</div>
            <button class="bg-slate-800 w-10 h-10 rounded" onclick="transposeUp()">+</button>
        </div>
    </div>

    <div id="play-lyrics" class="flex-1 overflow-auto p-6 no-scrollbar" onclick="toggleFullscreen()"></div>

    <div class="player-ui p-4 bg-slate-900 flex justify-between items-center border-t border-slate-800">
        <button class="p-2" id="btn-prev" onclick="playPrev()">Anterior</button>
        <div class="flex items-center">
            <button id="btn-scroll" class="bg-green-500 text-black w-10 h-10 rounded-full mr-4 font-bold" onclick="toggleScroll(event)">▶</button>
            <input type="range" min="1" max="10" value="3" id="scroll-speed">
        </div>
        <button class="p-2" id="btn-next" onclick="playNext()">Próxima</button>
    </div>
</div>

<!-- MODAL FALLBACK -->
<div id="modal-add" class="modal-custom">
    <div class="modal-box">
        <h3 class="font-bold text-lg mb-4">Adicionar ao Show</h3>
        <div id="modal-shows-list" class="flex flex-col"></div>
        <button class="mt-4 w-full p-2 bg-slate-700 rounded" onclick="closeModal()">Fechar</button>
    </div>
</div>

<script>
// --- LOGICA ORIGINAL (SEM ALTERAR VARIAVEIS) ---
let library = JSON.parse(localStorage.getItem('biblio')) || [];
let shows = JSON.parse(localStorage.getItem('shows')) || [];
let currentShowSongs = null;
let playIndex = 0;
let transpose = 0;
let searchTerm = '';
let currentArtistFilter = null;
let edFontSize = 14;
let edColumns = 1;
let scrollInterval = null;

const notesSharp = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
const notesFlat = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];

function setTab(t) {
    document.querySelectorAll('.tab-content').forEach(x => x.classList.add('hidden'));
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('tab-active'));
    document.getElementById('tab-' + t).classList.remove('hidden');
    document.getElementById('tab-btn-' + t).classList.add('tab-active');
    if (t === 'musicas') renderBiblioteca();
    if (t === 'shows') renderShows();
    if (t === 'editor') updateEditorPreview();
}

function renderSongContent(container, cifraText, columns, fontSize, tp) {
    container.style.columnCount = columns;
    container.style.fontSize = fontSize + 'px';
    container.className = "lyrics-container no-scrollbar font-mono";
    const sections = cifraText.split('\n---\n');
    let finalHtml = '';
    sections.forEach((section, sIdx) => {
        const paragraphs = section.split('\n\n');
        const sectionStyle = sIdx > 0 ? 'style="break-before: column; -webkit-column-break-before: always;"' : '';
        finalHtml += `<div ${sectionStyle}>`;
        paragraphs.forEach(para => {
            if(!para.trim()) return;
            finalHtml += `<div class="verse-block">`;
            para.split('\n').forEach(line => { finalHtml += formatLine(line, tp); });
            finalHtml += `</div>`;
        });
        finalHtml += `</div>`;
    });
    container.innerHTML = finalHtml;
}

function formatLine(t, tp) {
    if (t.trim().startsWith('!')) return `<div class="note font-sans">${esc(t.substring(1))}</div>`;
    if (!t.trim()) return '<div class="h-2"></div>';
    const tokens = t.trim().split(/\s+/);
    const isChordLine = tokens.every(tk => /^[A-G](#|b)?(maj|min|m|dim|aug|sus|add|7|9|13|4|6|M)*(\/[A-G](#|b)?)?$/.test(tk));
    if (isChordLine) {
        const rendered = tp === 0 ? t : t.replace(/[A-G](?:#|b)?(?:maj|min|m|dim|aug|sus|add|7|9|13|4|6|M)*(?:\/[A-G](?:#|b)?)?/g, m => transposeChord(m, tp));
        return `<div class="chord">${rendered}</div>`;
    }
    return `<div class="lyric-line font-sans">${esc(t)}</div>`;
}

function transposeChord(chord, steps) {
    const match = chord.match(/^([A-G])(#|b)?(.*)$/);
    if (!match) return chord;
    let [ , root, acc, rest] = match;
    let note = root + (acc || '');
    let idx = notesSharp.indexOf(note);
    if (idx === -1) idx = notesFlat.indexOf(note);
    if (idx === -1) return chord;
    let newIdx = (idx + steps + 12) % 12;
    return notesSharp[newIdx] + rest;
}

function toggleScroll(e) {
    if(e) e.stopPropagation();
    const btn = document.getElementById('btn-scroll');
    const container = document.getElementById('play-lyrics');
    if (scrollInterval) {
        clearInterval(scrollInterval);
        scrollInterval = null;
        btn.textContent = '▶';
    } else {
        btn.textContent = '⏸';
        const speed = document.getElementById('scroll-speed').value;
        scrollInterval = setInterval(() => { container.scrollTop += 1; }, 110 - (speed * 10));
    }
}

function renderBiblioteca() {
    const div = document.getElementById('biblioteca-list');
    let filtradas = library.filter(m => 
        (m.title.toLowerCase().indexOf(searchTerm) > -1 || m.artist.toLowerCase().indexOf(searchTerm) > -1) &&
        (!currentArtistFilter || m.artist === currentArtistFilter)
    );
    div.innerHTML = filtradas.map(m => `
        <div class="bg-slate-900 p-4 rounded-xl flex justify-between items-center border border-slate-800 mb-2">
            <div onclick="viewSingleSong(${m.id})" class="cursor-pointer flex-1">
                <h3 class="font-bold text-white text-lg">${esc(m.title)}</h3>
                <p class="text-xs text-slate-500 uppercase font-bold">${esc(m.artist)}</p>
            </div>
            <div class="flex">
                <button class="p-2 text-green-400" onclick="openAddToShow(${m.id})">➕</button>
                <button class="p-2" onclick="editMusic(${m.id})">✏️</button>
                <button class="p-2 text-red-500" onclick="deleteMusic(${m.id})">🗑</button>
            </div>
        </div>
    `).join('');
    renderArtistTabs();
}

function renderArtistTabs() {
    const tabs = document.getElementById('artist-tabs');
    const artistas = [...new Set(library.map(x => x.artist))].sort();
    let html = `<button class="btn-ghost p-1 px-3 rounded mr-2 ${!currentArtistFilter ? 'bg-green-500 text-black' : ''}" onclick="filterArtist(null)">Todos</button>`;
    artistas.forEach(a => {
        html += `<button class="btn-ghost p-1 px-3 rounded mr-2 ${currentArtistFilter === a ? 'bg-green-500 text-black' : ''}" onclick="filterArtist('${esc(a)}')">${esc(a)}</button>`;
    });
    tabs.innerHTML = html;
}

function saveToLibrary() {
    const song = {
        id: Date.now(),
        title: document.getElementById('ed-title').value,
        artist: document.getElementById('ed-artist').value,
        key: document.getElementById('ed-key').value,
        preset: document.getElementById('ed-preset').value,
        cifra: document.getElementById('ed-cifra').value,
        fontSize: edFontSize,
        columns: edColumns
    };
    if(!song.title || !song.cifra) return alert("Preencha Título e Cifra");
    const idx = library.findIndex(x => x.title === song.title && x.artist === song.artist);
    if(idx >= 0) library[idx] = song; else library.push(song);
    localStorage.setItem('biblio', JSON.stringify(library));
    alert("Salvo!");
    setTab('musicas');
}

function renderShows() {
    const div = document.getElementById('shows-list');
    div.innerHTML = shows.map(s => `
        <div class="bg-slate-900 p-5 rounded-xl border border-slate-800 mb-4">
            <div class="flex justify-between items-center">
                <div>
                    <h2 class="text-xl font-bold text-green-400">${esc(s.name)}</h2>
                    <p class="text-xs text-slate-500 font-bold">${s.songs.length} músicas</p>
                </div>
                <div class="flex">
                    <button class="btn-primary p-2 px-4 rounded" onclick="playShow(${s.id})">▶ TOCAR</button>
                    <button class="ml-4 text-red-500" onclick="deleteShow(${s.id})">🗑</button>
                </div>
            </div>
        </div>
    `).join('');
}

function openAddToShow(songId) {
    const s = library.find(x => x.id === songId);
    const list = document.getElementById('modal-shows-list');
    list.innerHTML = shows.map(sh => `
        <button class="p-3 bg-slate-800 rounded mb-2 text-left" onclick="addToShow(${sh.id}, ${s.id})">${esc(sh.name)}</button>
    `).join('');
    document.getElementById('modal-add').style.display = 'flex';
}

function addToShow(showId, songId) {
    const sh = shows.find(x => x.id === showId);
    const sg = library.find(x => x.id === songId);
    sh.songs.push({...sg});
    localStorage.setItem('shows', JSON.stringify(shows));
    closeModal();
    alert("Adicionado!");
}

function exportarMasterApp() {
    let html = document.documentElement.outerHTML;
    const dataInjection = `let library = ${JSON.stringify(library)}; let shows = ${JSON.stringify(shows)};`;
    const regex = /let library = JSON\.parse\(localStorage\.getItem\('biblio'\)\) \|\| \[\];\s+let shows = JSON\.parse\(localStorage\.getItem\('shows'\)\) \|\| \[\];/;
    html = html.replace(regex, dataInjection);
    const blob = new Blob([html], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'TATU_PRO_IPAD.html';
    a.click();
}

// Helpers
function setEdCols(v) { edColumns = v; updateEditorPreview(); }
function changeEdFont(v) { edFontSize += v; updateEditorPreview(); }
function updateEditorPreview() { renderSongContent(document.getElementById('editor-preview'), document.getElementById('ed-cifra').value, edColumns, edFontSize, 0); }
function filterArtist(art) { currentArtistFilter = art; renderBiblioteca(); }
function searchSongs() { searchTerm = document.getElementById('search-input').value.toLowerCase(); renderBiblioteca(); }
function closeModal() { document.getElementById('modal-add').style.display = 'none'; }
function backToMenu() { if(scrollInterval) toggleScroll(); document.getElementById('show-play-screen').classList.add('hidden'); }
function transposeUp() { transpose++; renderPlay(); }
function transposeDown() { transpose--; renderPlay(); }
function playPrev() { if(playIndex > 0) { playIndex--; renderPlay(); } }
function playNext() { if(playIndex < currentShowSongs.length - 1) { playIndex++; renderPlay(); } }
function toggleFullscreen() { document.getElementById('show-play-screen').classList.toggle('is-fullscreen'); }
function viewSingleSong(id) { const m = library.find(x => x.id === id); currentShowSongs = [m]; playIndex = 0; transpose = 0; openPlayer(); }
function openPlayer() { document.getElementById('show-play-screen').classList.remove('hidden'); renderPlay(); }
function playShow(id) { const s = shows.find(x => x.id === id); if(!s.songs.length) return; currentShowSongs = s.songs; playIndex = 0; transpose = 0; openPlayer(); }
function renderPlay() {
    const s = currentShowSongs[playIndex];
    document.getElementById('play-title').textContent = s.title;
    document.getElementById('play-meta').textContent = `${s.artist} • Tom: ${s.key ? transposeChord(s.key, transpose) : 'N/A'}`;
    document.getElementById('play-preset').textContent = s.preset || '';
    document.getElementById('transpose-val').textContent = transpose;
    renderSongContent(document.getElementById('play-lyrics'), s.cifra, s.columns || 1, s.fontSize || 14, transpose);
}
function editMusic(id) {
    const m = library.find(x => x.id === id);
    document.getElementById('ed-title').value = m.title;
    document.getElementById('ed-artist').value = m.artist;
    document.getElementById('ed-key').value = m.key;
    document.getElementById('ed-preset').value = m.preset;
    document.getElementById('ed-cifra').value = m.cifra;
    edFontSize = m.fontSize || 14; edColumns = m.columns || 1; setTab('editor');
}
function createShow() { const n = prompt("Nome do Show:"); if(n) { shows.push({ id: Date.now(), name: n, songs: [] }); localStorage.setItem('shows', JSON.stringify(shows)); renderShows(); } }
function deleteMusic(id) { if(confirm("Excluir?")) { library = library.filter(x => x.id !== id); localStorage.setItem('biblio', JSON.stringify(library)); renderBiblioteca(); } }
function deleteShow(id) { if(confirm("Excluir?")) { shows = shows.filter(x => x.id !== id); localStorage.setItem('shows', JSON.stringify(shows)); renderShows(); } }
function clearEditor() { document.querySelectorAll('#tab-editor input, #tab-editor textarea').forEach(i => i.value = ''); updateEditorPreview(); }
function esc(t) { return t ? t.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''; }

setTab('musicas');
</script>
</body>
</html>
