<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tatu Chords Pro</title>
    
    <!-- Usando apenas Tailwind (o iOS 12 lida melhor com ele do que com DaisyUI) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Roboto+Mono:wght@500;700&display=swap');
        
        /* Fallbacks para iOS antigo */
        body { font-family: 'Inter', Helvetica, Arial, sans-serif; background-color: #020617; color: #f1f5f9; margin: 0; padding: 0; }
        .font-mono { font-family: 'Roboto Mono', monospace; }
        
        .tab-content { display: block; }
        .hidden { display: none !important; }

        /* Estilo da Cifra */
        .chord { color: #4ade80; font-weight: 700; height: 1.25rem; white-space: pre; font-size: 1.1em; }
        .lyric-line { color: #e2e8f0; font-weight: 600; line-height: 1.3; margin-bottom: 3px; }
        .note { color: #f87171; font-style: italic; border-left: 4px solid #f87171; padding-left: 10px; margin: 12px 0; background: rgba(248, 113, 113, 0.1); }
        .verse-block { margin-bottom: 1.8rem; }

        /* Fix para iOS 12 (Substituindo Gap) */
        .flex-gap-fix > * { margin: 5px; }
        
        /* Custom UI simplificada (sem depender do DaisyUI) */
        .my-btn { padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; display: inline-block; text-align: center; }
        .btn-green { background-color: #22c55e; color: #000; }
        .btn-outline { border: 1px solid #475569; background: transparent; color: #fff; }
        .my-input { background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 8px; color: #fff; width: 100%; box-sizing: border-box; }
        
        .card { background: #0f172a; border: 1px solid #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 10px; }

        .lyrics-container { column-gap: 2rem; column-fill: auto; }
        
        /* Player Screen */
        #show-play-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 100; display: flex; flex-direction: column; }
    </style>
</head>
<body>

<div id="main-app" class="max-w-4xl mx-auto pb-10">
    <header class="p-6 text-center">
        <h1 class="text-3xl font-bold text-green-400">TATU CHORDS</h1>
    </header>

    <!-- Navegação -->
    <div class="px-4 mb-6 flex text-center bg-slate-900 mx-4 rounded-lg overflow-hidden border border-slate-800">
        <div class="flex-1 p-3 cursor-pointer border-r border-slate-800" id="tab-btn-musicas" onclick="setTab('musicas')">Músicas</div>
        <div class="flex-1 p-3 cursor-pointer border-r border-slate-800" id="tab-btn-shows" onclick="setTab('shows')">Shows</div>
        <div class="flex-1 p-3 cursor-pointer" id="tab-btn-editor" onclick="setTab('editor')">Editor</div>
    </div>

    <!-- ABA: MÚSICAS -->
    <section id="tab-musicas" class="px-4">
        <input type="text" id="search-input" placeholder="Buscar música..." class="my-input mb-4" oninput="searchSongs()">
        <div id="artist-tabs" class="flex overflow-x-auto mb-4" style="white-space: nowrap; -webkit-overflow-scrolling: touch;"></div>
        <div id="biblioteca-list"></div>
    </section>

    <!-- ABA: SHOWS -->
    <section id="tab-shows" class="hidden px-4">
        <div class="flex mb-4">
            <button class="my-btn btn-green flex-1 mr-2" onclick="createShow()">➕ Novo Show</button>
            <button class="my-btn btn-outline" onclick="exportarMasterApp()">GERAR APP IPAD</button>
        </div>
        <div id="shows-list"></div>
    </section>

    <!-- ABA: EDITOR -->
    <section id="tab-editor" class="hidden px-4">
        <div class="card">
            <input id="ed-title" placeholder="Título" class="my-input mb-2">
            <input id="ed-artist" placeholder="Artista" class="my-input mb-2">
            <div class="flex mb-2">
                <input id="ed-key" placeholder="Tom" class="my-input mr-2">
                <input id="ed-preset" placeholder="Preset POD" class="my-input">
            </div>
            <textarea id="ed-cifra" oninput="updateEditorPreview()" placeholder="Cifra aqui..." class="my-input h-48 font-mono mb-4"></textarea>
            
            <div id="editor-preview" class="card bg-black min-h-[100px] overflow-auto mb-4"></div>
            
            <div class="flex">
                <button class="my-btn btn-green flex-1 mr-2" onclick="saveToLibrary()">💾 Salvar</button>
                <button class="my-btn btn-outline" onclick="clearEditor()">Limpar</button>
            </div>
        </div>
    </section>
</div>

<!-- PLAYER -->
<div id="show-play-screen" class="hidden">
    <div class="p-4 bg-slate-900 flex justify-between items-center border-b border-slate-800">
        <div class="flex items-center">
            <button class="mr-4 text-2xl" onclick="backToMenu()">✕</button>
            <div>
                <div id="play-title" class="font-bold text-green-400"></div>
                <div id="play-meta" class="text-xs text-slate-400"></div>
            </div>
        </div>
        <div class="flex items-center">
            <button class="my-btn btn-outline py-1" onclick="transposeDown()">-</button>
            <span class="mx-3 font-bold text-green-400" id="transpose-val">0</span>
            <button class="my-btn btn-outline py-1" onclick="transposeUp()">+</button>
        </div>
    </div>
    <div id="play-lyrics" class="flex-1 overflow-auto p-6" onclick="toggleFullscreen()"></div>
    <div class="p-4 bg-slate-900 flex justify-between items-center border-t border-slate-800">
        <button class="my-btn btn-outline" id="btn-prev" onclick="playPrev()">Anterior</button>
        <div class="flex items-center">
            <button id="btn-scroll" class="my-btn btn-outline mr-2" onclick="toggleScroll(event)">▶</button>
            <input type="range" min="1" max="10" value="3" id="scroll-speed" style="width: 60px;">
        </div>
        <button class="my-btn btn-outline" id="btn-next" onclick="playNext()">Próxima</button>
    </div>
</div>

<script>
// Mantive sua lógica original de JS, apenas removendo chamadas de Modal do DaisyUI 
// e garantindo que o localStorage seja tratado corretamente.

let library = JSON.parse(localStorage.getItem('biblio')) || [];
let shows = JSON.parse(localStorage.getItem('shows')) || [];
let currentShowSongs = null;
let playIndex = 0;
let transpose = 0;
let searchTerm = '';
let currentArtistFilter = null;
let edFontSize = 16; 
let edColumns = 1;
let scrollInterval = null;

const notesSharp = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
const notesFlat = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];

function setTab(t) {
    document.getElementById('tab-musicas').classList.add('hidden');
    document.getElementById('tab-shows').classList.add('hidden');
    document.getElementById('tab-editor').classList.add('hidden');
    
    document.getElementById('tab-' + t).classList.remove('hidden');
    
    // Feedback visual da tab
    document.getElementById('tab-btn-musicas').style.backgroundColor = 'transparent';
    document.getElementById('tab-btn-shows').style.backgroundColor = 'transparent';
    document.getElementById('tab-btn-editor').style.backgroundColor = 'transparent';
    document.getElementById('tab-btn-' + t).style.backgroundColor = '#1e293b';

    if (t === 'musicas') renderBiblioteca();
    if (t === 'shows') renderShows();
}

function renderSongContent(container, cifraText, columns, fontSize, tp) {
    container.style.columnCount = columns;
    container.style.fontSize = fontSize + 'px';
    
    const sections = cifraText.split('\n---\n');
    let finalHtml = '';

    sections.forEach((section, sIdx) => {
        const paragraphs = section.split('\n\n');
        finalHtml += `<div>`;
        paragraphs.forEach(para => {
            if(!para.trim()) return;
            finalHtml += `<div class="verse-block">`;
            para.split('\n').forEach(line => { finalHtml += formatLine(line, tp); });
            finalHtml += `</div>`;
        });
        finalHtml += `</div>`;
    });
    container.innerHTML = finalHtml;
}

function formatLine(t, tp) {
    if (t.trim().startsWith('!')) return `<div class="note">${esc(t.substring(1))}</div>`;
    if (!t.trim()) return '<div style="height:10px"></div>';
    
    const tokens = t.trim().split(/\s+/);
    // Regex simplificada para compatibilidade
    const isChordLine = tokens.length > 0 && tokens.every(tk => /^[A-G]/.test(tk));

    if (isChordLine && t.length < 50) {
        const rendered = tp === 0 ? t : t.replace(/[A-G](?:#|b)?(?:[a-zA-Z0-9]*)?(?:\/[A-G](?:#|b)?)?/g, m => transposeChord(m, tp));
        return `<div class="chord">${rendered}</div>`;
    }
    return `<div class="lyric-line">${esc(t)}</div>`;
}

function transposeChord(chord, steps) {
    const match = chord.match(/^([A-G])(#|b)?(.*)$/);
    if (!match) return chord;
    let root = match[1] + (match[2] || '');
    let rest = match[3] || '';
    let idx = notesSharp.indexOf(root);
    if (idx === -1) idx = notesFlat.indexOf(root);
    if (idx === -1) return chord;
    let newIdx = (idx + steps + 12) % 12;
    return notesSharp[newIdx] + rest;
}

function toggleScroll(e) {
    if(e) e.stopPropagation();
    const btn = document.getElementById('btn-scroll');
    const container = document.getElementById('play-lyrics');
    if (scrollInterval) {
        clearInterval(scrollInterval);
        scrollInterval = null;
        btn.textContent = '▶';
    } else {
        btn.textContent = '⏸';
        const speed = document.getElementById('scroll-speed').value;
        scrollInterval = setInterval(() => { container.scrollTop += 1; }, 110 - (speed * 10));
    }
}

function viewSingleSong(id) {
    const m = library.find(x => x.id == id);
    currentShowSongs = [m]; playIndex = 0; transpose = 0; 
    openPlayer();
}

function openPlayer() {
    document.getElementById('show-play-screen').classList.remove('hidden');
    renderPlay();
}

function renderPlay() {
    const s = currentShowSongs[playIndex];
    document.getElementById('play-title').textContent = s.title;
    document.getElementById('play-meta').textContent = s.artist + " | Tom: " + (s.key || 'N/A');
    document.getElementById('transpose-val').textContent = transpose;
    renderSongContent(document.getElementById('play-lyrics'), s.cifra, s.columns || 1, s.fontSize || 16, transpose);
}

function backToMenu() { 
    if(scrollInterval) toggleScroll(); 
    document.getElementById('show-play-screen').classList.add('hidden'); 
}

function renderBiblioteca() {
    const div = document.getElementById('biblioteca-list');
    let filtradas = library.filter(m => 
        (m.title.toLowerCase().indexOf(searchTerm) > -1 || m.artist.toLowerCase().indexOf(searchTerm) > -1) &&
        (!currentArtistFilter || m.artist === currentArtistFilter)
    );
    div.innerHTML = filtradas.map(m => `
        <div class="card flex justify-between items-center">
            <div onclick="viewSingleSong(${m.id})" style="flex:1">
                <div class="font-bold text-lg">${esc(m.title)}</div>
                <div class="text-xs text-slate-500 uppercase">${esc(m.artist)}</div>
            </div>
            <button class="my-btn btn-outline" onclick="deleteMusic(${m.id})">🗑</button>
        </div>
    `).join('');
}

function saveToLibrary() {
    const song = {
        id: Date.now(),
        title: document.getElementById('ed-title').value,
        artist: document.getElementById('ed-artist').value,
        key: document.getElementById('ed-key').value,
        preset: document.getElementById('ed-preset').value,
        cifra: document.getElementById('ed-cifra').value,
        fontSize: edFontSize,
        columns: edColumns
    };
    if(!song.title || !song.cifra) return alert("Preencha Título e Cifra");
    library.push(song);
    localStorage.setItem('biblio', JSON.stringify(library));
    alert("Salvo!");
    setTab('musicas');
}

function deleteMusic(id) {
    if(confirm("Excluir?")) {
        library = library.filter(x => x.id != id);
        localStorage.setItem('biblio', JSON.stringify(library));
        renderBiblioteca();
    }
}

function searchSongs() { 
    searchTerm = document.getElementById('search-input').value.toLowerCase(); 
    renderBiblioteca(); 
}

function transposeUp() { transpose++; renderPlay(); }
function transposeDown() { transpose--; renderPlay(); }
function playPrev() { if(playIndex > 0) { playIndex--; renderPlay(); } }
function playNext() { if(playIndex < currentShowSongs.length - 1) { playIndex++; renderPlay(); } }

function esc(t) { 
    if(!t) return '';
    return t.toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); 
}

// Inicializar
setTab('musicas');
</script>

</body>
</html>
