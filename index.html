<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tatu Chords">
    <title>TATU MASTER PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', Helvetica, Arial, sans-serif; background-color: #020617; color: #f1f5f9; margin: 0; overflow-y: auto; }
        button { background: transparent; border: none; cursor: pointer; }
        .tab-content { display: none !important; }
        .tab-content.active { display: block !important; }
        .nav-bar { display: flex; background: #0f172a; margin: 10px; border-radius: 10px; border: 1px solid #1e293b; overflow: hidden; }
        .nav-item { flex: 1; padding: 12px; text-align: center; font-weight: bold; cursor: pointer; color: #94a3b8; }
        .nav-item.active { background: #22c55e; color: #000; }
        .btn-ui { padding: 8px 12px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; display: inline-block; text-align: center; font-size: 13px; }
        .btn-green { background: #22c55e; color: #000; }
        .btn-blue { background: #3b82f6; color: #fff; }
        .btn-ghost { background: transparent; border: 1px solid #334155; color: #fff; }
        .input-ui { background: #000; border: 1px solid #334155; color: #fff; padding: 12px; width: 100%; border-radius: 8px; margin-bottom: 8px; box-sizing: border-box; }
        .card-song { background: #0f172a; border: 1px solid #1e293b; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        #show-play-screen { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 9999; display: none; flex-direction: column; overflow: auto; }
        #show-play-screen.active { display: flex !important; }
        #show-play-screen.full-mode .player-bar { display: none !important; }
        .player-bar { height: 70px; background: #0f172a; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; flex-shrink: 0; box-sizing: border-box; }
        .lyrics-render-area { display: block; width: 100%; box-sizing: border-box; }
        .lyrics-render-area.multi-column { display: inline-block; width: auto; min-width: 100%; }
        .verse-block { margin-bottom: 1.5rem; break-inside: avoid-column; -webkit-column-break-inside: avoid; page-break-inside: avoid; }
        #play-lyrics { flex: 1; overflow-x: auto !important; overflow-y: auto !important; -webkit-overflow-scrolling: touch; padding: 25px; box-sizing: border-box; width: 100%; }
        .ipad-frame { width: 768px !important; height: 1024px !important; margin: 20px auto; border: 8px solid #334155; border-radius: 20px; position: relative; background: #000; display: flex !important; flex-direction: column; overflow: hidden !important; box-sizing: border-box; }
        .ipad-label { display: none; text-align: center; font-size: 12px; color: #facc15; margin-top: 10px; font-weight: bold; }
        .ipad-mode-on .ipad-label { display: block; }
        .chord { color: #4ade80; white-space: pre-wrap; font-weight: bold; font-family: 'Courier New', Courier, monospace; font-size: 1.1em; letter-spacing: 0.5px; }
        .lyric-line { font-size: 1em; white-space: pre-wrap; }
        .preset-badge { background: #ef4444; color: #fff; padding: 2px 8px; border-radius: 4px; font-weight: 900; font-size: 11px; text-transform: uppercase; box-shadow: 0 0 12px rgba(239, 68, 68, 0.6); text-shadow: 0 0 5px #fff, 0 0 10px #fff; border: 1px solid #fff; margin-left: 10px; display: inline-block; }
        .note-box { color: #f87171; font-style: italic; border-left: 4px solid #f87171; padding: 5px 10px; margin: 10px 0; background: rgba(248, 113, 113, 0.1); font-size: 0.9em; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #0f172a; padding: 20px; border-radius: 15px; width: 85%; max-width: 400px; border: 1px solid #334155; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media (max-width: 820px) { .ipad-frame { width: calc(100vw - 24px) !important; height: calc((100vw - 24px) * 1.3333) !important; max-height: 1024px; } }
    </style>
</head>
<body>

<div id="main-ui-wrapper">
    <header style="text-align: center; padding: 15px; position: relative;">
        <h1 style="color: #4ade80; font-size: 22px; font-weight: bold;">TATU MASTER PRO</h1>
        <div id="midi-status" style="position: absolute; top: 20px; right: 20px; display: flex; align-items: center; font-size: 10px; color: #94a3b8;">
            <span id="midi-dot" style="width: 10px; height: 10px; background: #ef4444; border-radius: 50%; margin-right: 5px; box-shadow: 0 0 5px #ef4444;"></span>
            MIDI OFF
        </div>
    </header>

    <div class="nav-bar">
        <div class="nav-item active" onclick="setTab('musicas')" id="btn-tab-musicas">Músicas</div>
        <div class="nav-item" onclick="setTab('shows')" id="btn-tab-shows">Shows</div>
        <div class="nav-item" onclick="setTab('editor')" id="btn-tab-editor">Editor</div>
    </div>

    <section id="tab-musicas" class="tab-content active" style="padding: 10px;">
        <input type="text" id="search-input" placeholder="Buscar música..." class="input-ui" oninput="searchSongs()">
        <div id="artist-tabs" style="display: flex; overflow-x: auto; margin-bottom: 10px; padding-bottom: 5px;" class="no-scrollbar"></div>
        <div id="biblioteca-list"></div>
    </section>

    <section id="tab-shows" class="tab-content" style="padding: 10px;">
        <div style="display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap;">
            <button class="btn-ui btn-blue" style="flex: 2;" onclick="createShow()">+ Novo Show</button>
            <button class="btn-ui btn-ghost" onclick="importarBackup()">IMPORTAR</button>
            <button class="btn-ui btn-ghost" onclick="baixarBackupJson()">BACKUP</button>
            <button class="btn-ui btn-ghost" onclick="exportarMasterApp()">EXPORTAR IPAD</button>
        </div>
        <input type="file" id="backup-file" accept=".json" style="display:none" onchange="lerArquivoBackup(this)">
        <div id="shows-list"></div>
    </section>

    <section id="tab-editor" class="tab-content" style="padding: 10px;">
        <div style="background: #0f172a; padding: 15px; border-radius: 12px; border: 1px solid #1e293b;">
            <div style="display: flex; gap: 5px; margin-bottom: 8px;">
                <input id="ed-title" placeholder="Título" class="input-ui">
                <input id="ed-artist" placeholder="Artista" class="input-ui">
            </div>
            <div style="display: flex; gap: 5px; margin-bottom: 8px;">
                <input id="ed-key" placeholder="Tom" class="input-ui" style="color: #4ade80;">
                <input id="ed-capo" placeholder="Capo" class="input-ui" style="color: #facc15;">
                <input id="ed-preset" placeholder="Preset POD" class="input-ui" style="color: #ef4444;">
            </div>
            <textarea id="ed-cifra" oninput="scheduleEditorPreview()" placeholder="Cifra aqui..." class="input-ui no-scrollbar" style="height: 400px; font-family: monospace;"></textarea>
            
            <div style="background: #000; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #1e293b;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <button class="btn-ui btn-ghost" onclick="changeEdFont(1)">A+</button>
                    <button class="btn-ui btn-ghost" onclick="toggleIpadView()">SIMULAR IPAD</button>
                    <button class="btn-ui btn-ghost" onclick="changeEdSpacing(0.1)">S+</button>
                </div>
                <div style="display: flex; justify-content: center; gap: 8px;">
                    <button id="btn-col-1" class="btn-ui btn-ghost" onclick="setEdCols(1)">1 Col</button>
                    <button id="btn-col-2" class="btn-ui btn-ghost" onclick="setEdCols(2)">2 Col</button>
                    <button id="btn-col-3" class="btn-ui btn-ghost" onclick="setEdCols(3)">3 Col</button>
                </div>
            </div>
            <div id="editor-preview-wrapper" style="background: #000; border-radius: 8px; border: 1px solid #1e293b;">
                <div id="editor-preview" style="padding: 15px; min-height: 100px;"></div>
            </div>
            <div style="display: flex; gap: 8px; margin-top: 15px;">
                <button class="btn-ui btn-green" style="flex: 2; height: 45px;" onclick="saveToLibrary()">SALVAR</button>
                <button class="btn-ui btn-ghost" style="flex: 1;" onclick="clearEditor()">Limpar</button>
            </div>
        </div>
    </section>
</div>

<div id="show-play-screen">
    <div class="player-bar">
        <div style="display: flex; align-items: center;">
            <button onclick="backToMenu()" style="color: #fff; font-size: 26px; margin-right: 15px;">X</button>
            <div>
                <div id="play-title" style="font-weight: bold; color: #4ade80;"></div>
                <div id="play-meta" style="font-size: 11px; color: #94a3b8;"></div>
            </div>
        </div>
        <div>
            <button class="btn-ui btn-ghost" onclick="transposeDown()">-</button>
            <span id="transpose-val" style="margin: 0 10px; color: #4ade80; font-weight: bold;">0</span>
            <button class="btn-ui btn-ghost" onclick="transposeUp()">+</button>
        </div>
    </div>
    <div id="play-lyrics" class="no-scrollbar"></div>
    <div class="player-bar">
        <button class="btn-ui btn-ghost" onclick="playPrev()">Anterior</button>
        <button id="btn-scroll" class="btn-ui btn-green" style="border-radius: 50%; width: 50px; height: 50px;" onclick="toggleScroll()">PLAY</button>
        <button class="btn-ui btn-ghost" onclick="playNext()">Próxima</button>
    </div>
</div>

<div id="modal-add" class="modal-overlay">
    <div class="modal-content">
        <h3 style="text-align: center; color: #22c55e; margin-bottom: 15px;">Adicionar ao Show</h3>
        <div id="modal-shows-list"></div>
        <button class="btn-ui btn-ghost" style="width: 100%; margin-top: 10px;" onclick="closeModal()">Fechar</button>
    </div>
</div>

<script>
// DATA_START
var library = JSON.parse(localStorage.getItem('biblio')) || [];
var shows = JSON.parse(localStorage.getItem('shows')) || [];
// DATA_END

var currentShowSongs = null, playIndex = 0, transpose = 0, searchTerm = '', currentArtistFilter = null;
var edFontSize = 20, edLineHeight = 1.45, edColumns = 2, currentEditingId = null;
var editorPreviewTimer = null, scrollInterval = null, isIpadView = false;
var notesSharp = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'], notesFlat = ['C', 'Db', 'D', 'Eb', 'E', 'F', 'Gb', 'G', 'Ab', 'A', 'Bb', 'B'];

// =========================================================
// BLOCO MIDI FINAL - CORRIGIDO E TESTADO
// =========================================================
var midiAccess = null;
var midiIn = null;
var midiOut = null;

function initMIDI() {
    console.log("SISTEMA: Tentando conexão com a POD...");
    if (navigator.requestMIDIAccess) {
        // Pedimos software:true para tentar 'roubar' o foco do driver
        navigator.requestMIDIAccess({ sysex: true, software: true }).then(function(access) {
            midiAccess = access;
            console.log("SISTEMA: Acesso concedido! Aguardando 3 segundos para o driver liberar...");
            
            // O segredo: esperar o driver 'respirar'
            setTimeout(detectDevices, 3000);
            
            midiAccess.onstatechange = function(e) {
                console.log("Troca de cabo/hardware: " + e.port.name + " " + e.port.state);
                detectDevices();
            };
        }, function(err) {
            console.error("Erro MIDI:", err);
        });
    }
}

function detectDevices() {
    var statusDiv = document.getElementById('midi-status');
    midiOut = null; 
    var foundName = "Nenhum";

    // Debug agressivo
    console.log("Varrendo portas... Saídas Totais detectadas: " + midiAccess.outputs.size);

    // Listar nomes de todas as saídas (se houver alguma oculta aparecerá aqui)
    midiAccess.outputs.forEach(function(port) {
        console.log("TENTANDO ACESSO -> SAÍDA: " + port.name);
        midiOut = port;
        foundName = port.name;
    });

    if (statusDiv) {
        if (midiOut) {
            statusDiv.innerHTML = '<span style="width:10px;height:10px;background:#22c55e;border-radius:50%;margin-right:5px;box-shadow:0 0 10px #22c55e;"></span>' + foundName.toUpperCase();
            statusDiv.style.color = "#22c55e";
            console.log(">>> SUCESSO: Saída MIDI liberada pelo Windows!");
        } else {
            statusDiv.innerHTML = '<span style="width:10px;height:10px;background:#ef4444;border-radius:50%;margin-right:5px;box-shadow:0 0 5px #ef4444;"></span> PORTA BLOQUEADA';
            statusDiv.style.color = "#ef4444";
            console.warn("DICA: Desative a POD no Painel de Som do Windows (Reprodução/Gravação) e reinicie o Chrome.");
        }
    }
}

function enviarPC(index) {
    if (midiOut) {
        // Envia Program Change no Canal 1 (0xC0)
        midiOut.send([0xC0, index]); 
        console.log("SUCESSO: Enviado PC #" + index + " para " + midiOut.name);
    } else {
        console.warn("AVISO: Nenhuma saída MIDI ativa para enviar comando.");
    }
}

function handleMidiInput(event) {
    // Espaço para pedal Chocolate futuro
}


// UI LOGIC
function setTab(t) {
    var tabs = document.getElementsByClassName('tab-content');
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
    document.getElementById('tab-' + t).classList.add('active');
    if (t === 'musicas') renderBiblioteca();
    if (t === 'shows') renderShows();
}

function renderPlay() {
    var s = currentShowSongs[playIndex];
    enviarPC(playIndex); 
    document.getElementById('play-title').textContent = s.title;
    document.getElementById('play-meta').innerHTML = esc(s.artist) + ' - Tom: ' + esc(s.key || 'N/A') + (s.capo ? ' - Capo: ' + s.capo : '') + (s.preset ? ' <span class="preset-badge">'+s.preset+'</span>' : '');
    document.getElementById('transpose-val').textContent = transpose;
    renderSongContent(document.getElementById('play-lyrics'), s.cifra, s.columns || 1, s.fontSize || 18, s.lineHeight || 1.3, transpose);
}

function renderSongContent(container, cifraText, columns, fontSize, spacing, tp) {
    container.innerHTML = '';
    var colCount = parseInt(columns, 10) || 1;
    var area = document.createElement('div');
    area.className = 'lyrics-render-area' + (colCount > 1 ? ' multi-column' : '');
    area.style.fontSize = fontSize + 'px';
    area.style.lineHeight = spacing;
    if (colCount > 1) { area.style.height = '860px'; area.style.columnCount = colCount; area.style.columnGap = '60px'; }
    var sections = (cifraText || '').split('\n---\n');
    var html = '';
    for (var i = 0; i < sections.length; i++) {
        var paragraphs = sections[i].split('\n\n');
        html += '<div style="'+(i > 0 && colCount > 1 ? 'break-before:column;-webkit-column-break-before:always;' : '')+'">';
        for (var j = 0; j < paragraphs.length; j++) {
            var pText = paragraphs[j].trim(); if (!pText) continue;
            html += '<div class="verse-block">';
            var lines = pText.split('\n');
            for (var k = 0; k < lines.length; k++) html += formatLine(lines[k], tp);
            html += '</div>';
        }
        html += '</div>';
    }
    area.innerHTML = html; container.appendChild(area);
}

function formatLine(t, tp) {
    if (t.trim().indexOf('!') === 0) return '<div class="note-box">' + esc(t.substring(1)) + '</div>';
    var chordRegex = /^[A-G](#|b)?(m|min|maj|M|dim|aug|sus|add|alt|Delta|deg|[0-9]|\+|\-|\(|\))*(\/[A-G](#|b)?)?$/;
    var isChord = true; var tokens = t.trim().split(/\s+/);
    for(var i=0; i<tokens.length; i++){ if(!chordRegex.test(tokens[i])) isChord = false; }
    if (isChord && tokens.length > 0) {
        var rendered = t.replace(/[A-G](#|b)?([a-zA-Z0-9\(\)\+\-]*)(\/[A-G](#|b)?)?/g, function(m) { return tp === 0 ? m : transposeChord(m, tp); });
        return '<div class="chord">' + rendered + '</div>';
    }
    return '<div class="lyric-line">' + esc(t) + '</div>';
}

function transposeChord(chord, steps) {
    return chord.split('/').map(function(part) {
        var match = part.match(/^([A-G][#b]?)(.*)$/); if (!match) return part;
        var root = match[1], rest = match[2], idx = notesSharp.indexOf(root);
        if (idx === -1) idx = notesFlat.indexOf(root); if (idx === -1) return part;
        var newIdx = (idx + steps + 12) % 12; return notesSharp[newIdx] + rest;
    }).join('/');
}

function renderBiblioteca() {
    var div = document.getElementById('biblioteca-list'), html = '';
    var filtradas = library.filter(function(m) {
        return (m.title.toLowerCase().indexOf(searchTerm) > -1 || m.artist.toLowerCase().indexOf(searchTerm) > -1) && (!currentArtistFilter || m.artist === currentArtistFilter);
    });
    for(var i=0; i<filtradas.length; i++) {
        var m = filtradas[i];
        html += '<div class="card-song"><div onclick="viewSingleSong('+m.id+')" style="flex:1"><b>'+esc(m.title)+'</b><br><small>'+esc(m.artist)+'</small></div><div style="display:flex;"><button onclick="openAddToShow('+m.id+')" style="color:#22c55e;padding:10px;">ADD</button><button onclick="editMusic('+m.id+')" style="color:#3b82f6;padding:10px;">EDIT</button><button onclick="deleteMusic('+m.id+')" style="color:#ef4444;padding:10px;">DEL</button></div></div>';
    }
    div.innerHTML = html; renderArtistTabs();
}

function renderArtistTabs() {
    var tabs = document.getElementById('artist-tabs'), artMap = {};
    for(var i=0; i<library.length; i++) artMap[library[i].artist || 'Desconhecido'] = true;
    var artistas = Object.keys(artMap).sort();
    var html = '<button onclick="filterArtist(null)" style="padding:6px 12px;margin-right:5px;border-radius:5px;background:'+(!currentArtistFilter?'#22c55e':'#1e293b')+'">Todos</button>';
    artistas.forEach(function(a){ html += '<button onclick="filterArtist(\''+a+'\')" style="padding:6px 12px;margin-right:5px;border-radius:5px;background:'+(currentArtistFilter==a?'#22c55e':'#1e293b')+'">'+a+'</button>'; });
    tabs.innerHTML = html;
}

function saveToLibrary() {
    var title = document.getElementById('ed-title').value, cifra = document.getElementById('ed-cifra').value;
    if(!title || !cifra) return alert("Erro");
    var song = { id: currentEditingId || Date.now(), title: title, artist: document.getElementById('ed-artist').value || "Desconhecido", key: document.getElementById('ed-key').value, capo: document.getElementById('ed-capo').value, preset: document.getElementById('ed-preset').value, cifra: cifra, fontSize: edFontSize, columns: edColumns, lineHeight: edLineHeight };
    var idx = library.findIndex(function(m){ return m.id == song.id; });
    if(idx >= 0) library[idx] = song; else library.push(song);
    localStorage.setItem('biblio', JSON.stringify(library)); alert("Salvo!"); setTab('musicas');
}

function editMusic(id) {
    var m = library.find(function(x){ return x.id == id; }); if(!m) return;
    currentEditingId = m.id;
    document.getElementById('ed-title').value = m.title; document.getElementById('ed-artist').value = m.artist;
    document.getElementById('ed-key').value = m.key || ''; document.getElementById('ed-capo').value = m.capo || '';
    document.getElementById('ed-preset').value = m.preset || ''; document.getElementById('ed-cifra').value = m.cifra;
    edFontSize = m.fontSize || 20; edColumns = m.columns || 2; edLineHeight = m.lineHeight || 1.45;
    setTab('editor'); updateEditorPreview();
}

function createShow() { var n = prompt("Nome:"); if(n) { shows.push({id:Date.now(), name:n, songs:[]}); localStorage.setItem('shows', JSON.stringify(shows)); renderShows(); } }
function renderShows() {
    var div = document.getElementById('shows-list'), html = '';
    shows.forEach(function(s, i) {
        html += '<div class="card-song" style="flex-direction:column;align-items:stretch;"><div style="display:flex;justify-content:space-between;"><b>'+esc(s.name)+'</b><div><button class="btn-ui btn-blue" onclick="playShow('+s.id+')">TOCAR</button><button onclick="deleteShow('+s.id+')" style="color:#ef4444;margin-left:10px;">DEL</button></div></div>';
        s.songs.forEach(function(song, j) { 
            html += '<div style="display:flex;justify-content:space-between;font-size:12px;padding:4px;border-top:1px solid #1e293b;">'+(j+1)+'. '+esc(song.title)+'<div><button onclick="moveSong('+i+','+j+',-1)">⬆</button><button onclick="moveSong('+i+','+j+',1)" style="margin:0 8px">⬇</button><button onclick="removeFromShow('+i+','+j+')" style="color:#ef4444">X</button></div></div>'; 
        });
        html += '</div>';
    });
    div.innerHTML = html;
}

function moveSong(shIdx, sgIdx, dir) {
    var s = shows[shIdx].songs; var target = sgIdx + dir;
    if(target >= 0 && target < s.length) { var temp = s[sgIdx]; s[sgIdx] = s[target]; s[target] = temp; localStorage.setItem('shows', JSON.stringify(shows)); renderShows(); }
}
function removeFromShow(shIdx, sgIdx) { shows[shIdx].songs.splice(sgIdx, 1); localStorage.setItem('shows', JSON.stringify(shows)); renderShows(); }
function viewSingleSong(id) { var m = library.find(function(x){ return x.id == id; }); if(m){ currentShowSongs = [m]; playIndex = 0; transpose = 0; openPlayer(); } }
function playShow(id) { var s = shows.find(function(x){ return x.id == id; }); if(s && s.songs.length){ currentShowSongs = s.songs; playIndex = 0; transpose = 0; openPlayer(); } }
function playNext() { if(playIndex < currentShowSongs.length - 1){ playIndex++; renderPlay(); } }
function playPrev() { if(playIndex > 0){ playIndex--; renderPlay(); } }
function openPlayer() { document.getElementById('show-play-screen').classList.add('active'); renderPlay(); }
function backToMenu() { document.getElementById('show-play-screen').classList.remove('active'); if(scrollInterval) toggleScroll(); }
function transposeUp() { transpose++; renderPlay(); }
function transposeDown() { transpose--; renderPlay(); }
function esc(t) { return t ? t.toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') : ''; }
function closeModal() { document.getElementById('modal-add').style.display='none'; }
function openAddToShow(id) {
    var list = document.getElementById('modal-shows-list'), html = '';
    shows.forEach(function(s) { html += '<button class="btn-ui btn-ghost" style="width:100%;margin-bottom:5px;" onclick="addToShow('+s.id+','+id+')">'+esc(s.name)+'</button>'; });
    list.innerHTML = html || 'Crie um show primeiro'; document.getElementById('modal-add').style.display='flex';
}
function addToShow(shId, sgId) {
    var sh = shows.find(function(x){return x.id==shId;}), sg = library.find(function(x){return x.id==sgId;});
    if(sh && sg){ sh.songs.push(JSON.parse(JSON.stringify(sg))); localStorage.setItem('shows', JSON.stringify(shows)); closeModal(); alert("Add!"); }
}

function baixarBackupJson() {
    var blob = new Blob([JSON.stringify({library:library, shows:shows})], {type: 'application/json'});
    var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'TATU_BACKUP.json'; a.click();
}
function importarBackup() { document.getElementById('backup-file').click(); }
function lerArquivoBackup(input) {
    var r = new FileReader(); r.onload = function(e){
        var d = JSON.parse(e.target.result); library = d.library || []; shows = d.shows || [];
        localStorage.setItem('biblio', JSON.stringify(library)); localStorage.setItem('shows', JSON.stringify(shows));
        renderBiblioteca(); renderShows();
    }; r.readAsText(input.files[0]);
}
function exportarMasterApp() {
    var html = document.documentElement.outerHTML;
    var dataInj = '// DATA_START\nvar library = ' + JSON.stringify(library) + ';\nvar shows = ' + JSON.stringify(shows) + ';\n// DATA_END';
    html = html.replace(/\/\/ DATA_START[\s\S]*?\/\/ DATA_END/, dataInj);
    var a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([html], {type:'text/html'})); a.download = 'TATU_PRO_IPAD.html'; a.click();
}

function scheduleEditorPreview() { if(editorPreviewTimer) clearTimeout(editorPreviewTimer); editorPreviewTimer = setTimeout(updateEditorPreview, 200); }
function updateEditorPreview() { renderSongContent(document.getElementById('editor-preview'), document.getElementById('ed-cifra').value, edColumns, edFontSize, edLineHeight, 0); }
function changeEdFont(v) { edFontSize += v; updateEditorPreview(); }
function changeEdSpacing(v) { edLineHeight += v; updateEditorPreview(); }
function setEdCols(v) { edColumns = v; updateEditorPreview(); }
function clearEditor() { currentEditingId = null; document.getElementById('ed-title').value=''; document.getElementById('ed-artist').value=''; document.getElementById('ed-cifra').value=''; updateEditorPreview(); }
function toggleIpadView() { isIpadView = !isIpadView; document.getElementById('editor-preview-wrapper').className = isIpadView ? 'ipad-frame' : ''; updateEditorPreview(); }

function toggleScroll() {
    var btn = document.getElementById('btn-scroll'), container = document.getElementById('play-lyrics');
    if (scrollInterval) { clearInterval(scrollInterval); scrollInterval = null; btn.textContent = 'PLAY'; }
    else { btn.textContent = 'PAUSE'; scrollInterval = setInterval(function() { container.scrollTop += 1; }, 50); }
}

function searchSongs() { searchTerm = document.getElementById('search-input').value.toLowerCase(); renderBiblioteca(); }
function filterArtist(a) { currentArtistFilter = a; renderBiblioteca(); }
function deleteMusic(id) { if(confirm('Excluir?')){ library = library.filter(function(x){return x.id!=id;}); localStorage.setItem('biblio', JSON.stringify(library)); renderBiblioteca(); } }
function deleteShow(id) { if(confirm('Excluir?')){ shows = shows.filter(function(x){return x.id!=id;}); localStorage.setItem('shows', JSON.stringify(shows)); renderShows(); } }

initMIDI(); renderBiblioteca(); renderShows();
</script>
